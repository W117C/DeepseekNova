name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Check (fast compile verification) ──────────────────────────
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies
        uses: ./.github/actions/setup-linux
      - name: Verify native dependencies
        run: |
          pkg-config --version
          pkg-config --libs glib-2.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --workspace

  # ── Clippy ────────────────────────────────────────────────────
  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies
        uses: ./.github/actions/setup-linux
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --workspace -- -D warnings

  # ── Format ────────────────────────────────────────────────────
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Tests ─────────────────────────────────────────────────────
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-linux
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --workspace

  # ── Docs ──────────────────────────────────────────────────────
  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies
        uses: ./.github/actions/setup-linux
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --workspace --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  # ── Release build (binary only, no cross-compile) ────────────
  release:
    name: release build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-linux
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} -p dpronix-cli
      - uses: actions/upload-artifact@v4
        with:
          name: dpronix-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/dpronix-cli*
          if-no-files-found: error
