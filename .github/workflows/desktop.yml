name: Desktop Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  desktop:
    name: desktop build (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: crates/deepseeknova-desktop/frontend
        run: npm ci

      - name: TypeScript check
        working-directory: crates/deepseeknova-desktop/frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: crates/deepseeknova-desktop/frontend
        run: npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Rust check (compile verify, no link)
        run: cargo check -p deepseeknova-desktop
