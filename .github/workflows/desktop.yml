name: Desktop Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  desktop:
    name: desktop build (ubuntu-latest)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        uses: ./.github/actions/setup-linux

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        working-directory: crates/dpronix-desktop/frontend
        run: npm ci

      - name: Build frontend
        working-directory: crates/dpronix-desktop/frontend
        run: npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build desktop app
        run: cargo build -p dpronix-desktop --release
