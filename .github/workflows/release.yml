# Release workflow — triggered by version tags (v*)
# Builds and publishes:
#   1. CLI binary (deepseeknova-cli) for 3 platforms
#   2. Desktop app (deepseeknova-desktop) for macOS + Linux
#   3. npm package with prebuilt binaries
#
# Uses the existing cargo-dist configuration from Cargo.toml

name: Release

on:
  push:
    tags: ["v*", "desktop-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── CLI Release Build (3 platforms) ──────────────────────────────
  cli-release:
    name: CLI release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: deepseeknova-cli
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: deepseeknova-cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: deepseeknova-cli.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p deepseeknova-cli

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mkdir -p /tmp/artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a -tzip /tmp/artifacts/deepseeknova-cli-${{ matrix.target }}.zip deepseeknova-cli.exe
          else
            tar czf /tmp/artifacts/deepseeknova-cli-${{ matrix.target }}.tar.gz deepseeknova-cli
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepseeknova-cli-${{ matrix.target }}
          path: /tmp/artifacts/deepseeknova-cli-${{ matrix.target }}.*
          if-no-files-found: error

  # ── Desktop Release (macOS + Linux) ─────────────────────────────
  desktop-release:
    name: Desktop release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/desktop-v') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: deepseeknova-desktop
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: deepseeknova-desktop
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-linux
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install Node.js for frontend build
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: |
          cd crates/deepseeknova-desktop/frontend
          npm ci
          npm run build

      - uses: Swatinem/rust-cache@v2

      - name: Build desktop app
        run: cargo build --release -p deepseeknova-desktop

      - name: Package desktop
        shell: bash
        run: |
          mkdir -p /tmp/artifacts
          cd target/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a -tzip /tmp/artifacts/deepseeknova-desktop-${{ matrix.target }}.zip *.exe
          else
            tar czf /tmp/artifacts/deepseeknova-desktop-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          fi

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepseeknova-desktop-${{ matrix.target }}
          path: /tmp/artifacts/deepseeknova-desktop-${{ matrix.target }}.*
          if-no-files-found: error

  # ── GitHub Release (publish artifacts) ──────────────────────────
  publish:
    name: Create GitHub Release
    needs: [cli-release, desktop-release]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/desktop-v')) &&
      (needs.cli-release.result == 'success') &&
      (needs.desktop-release.result == 'success' || needs.desktop-release.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Generate SHA256 checksums
        run: |
          cd /tmp/artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## DeepseekNova ${{ github.ref_name }}

            ### Downloads
            See artifacts attached to this release.

            ### Checksums
            SHA256 checksums are in checksums.txt attached to this release.

            ### Changes
            See the [CHANGELOG](CHANGELOG.md) for details.
          files: |
            /tmp/artifacts/**/*.tar.gz
            /tmp/artifacts/**/*.zip
            /tmp/artifacts/**/checksums.txt
          draft: true
          prerelease: false
