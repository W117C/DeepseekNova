name: Setup Linux dependencies
description: Installs all required system dependencies (GTK, WebKit, glib, etc.) for Tauri and desktop apps on Linux runners.

runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libglib2.0-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.0-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev
