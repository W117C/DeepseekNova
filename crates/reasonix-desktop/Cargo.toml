[package]
name = "reasonix-desktop"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-dialog = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-shell = "2"
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
reasonix-core = { version = "0.1.0", path = "../reasonix-core" }
reasonix-agent = { version = "0.1.0", path = "../reasonix-agent" }
reasonix-config = { version = "0.1.0", path = "../reasonix-config" }
reasonix-provider = { version = "0.1.0", path = "../reasonix-provider" }
reasonix-tools = { version = "0.1.0", path = "../reasonix-tools" }
reasonix-runtime = { version = "0.1.0", path = "../reasonix-runtime" }
reasonix-store = { version = "0.1.0", path = "../reasonix-store" }
reasonix-skills = { version = "0.1.0", path = "../reasonix-skills" }
reasonix-event = { version = "0.1.0", path = "../reasonix-event" }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
