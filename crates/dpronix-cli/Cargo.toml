[package]
name = "dpronix-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "CLI frontend for the dpronix agent framework with chat, plan, serve, and setup subcommands."
readme = "README.md"
documentation = "https://docs.rs/dpronix-cli/0.3.0"

[dependencies]
anyhow = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dpronix-core = { version = "0.3.0", path = "../dpronix-core" }
dpronix-config = { version = "0.3.0", path = "../dpronix-config" }
dpronix-provider = { version = "0.3.0", path = "../dpronix-provider" }
dpronix-agent = { version = "0.3.0", path = "../dpronix-agent" }
dpronix-tools = { version = "0.3.0", path = "../dpronix-tools" }
dpronix-runtime = { version = "0.3.0", path = "../dpronix-runtime" }
dpronix-skills = { version = "0.3.0", path = "../dpronix-skills" }
dpronix-serve = { version = "0.3.0", path = "../dpronix-serve" }
dirs = { workspace = true }

[dev-dependencies]
dpronix-security = { version = "0.3.0", path = "../dpronix-security" }
dpronix-mcp = { version = "0.3.0", path = "../dpronix-mcp" }
dpronix-orch = { version = "0.3.0", path = "../dpronix-orch" }
serde_json = { workspace = true }
