# Cargo Deny Configuration — Production Hardening
#
# Run locally:  cargo deny check
# CI:           .github/workflows/security.yml (deny job)

[advisories]
version = 2
vulnerability = "deny"
unmaintained = "deny"
ignore = []

[licenses]
version = 2
default = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unlicense",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "OpenSSL",
]
copyleft = "deny"
unlicensed = "deny"

[bans]
version = 2
multiple-versions = "warn"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
version = 2
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
