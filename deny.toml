# Cargo Deny Configuration

[advisories]
version = 2
vulnerability = "deny"
unmaintained = "warn"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unlicense",
    "Zlib",
]
copyleft = "deny"
unlicensed = "deny"

[bans]
version = 2
multiple-versions = "warn"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
version = 2
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
