[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
deny = []
skip = []

[advisories]
version = 2
ignore = [
    # RUSTSEC-2026-0002: lru IterMut unsoundness — only used by ratatui's internal
    # scrollback cache, which does not call IterMut. No actionable impact.
    # Removing this ignore requires upgrading ratatui to 0.30+ (which drops lru).
    "RUSTSEC-2026-0002",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
