# Cargo Deny Configuration

[advisories]
version = 2
vulnerability = "warn"
unmaintained = "warn"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unlicense",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "OpenSSL",
]
copyleft = "warn"
unlicensed = "warn"

[bans]
version = 2
multiple-versions = "warn"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
version = 2
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-registry = "allow"
unknown-git = "allow"
allow-git = []
